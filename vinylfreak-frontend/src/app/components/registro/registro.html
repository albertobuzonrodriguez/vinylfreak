<div class="registro-container" style="max-width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: white;">
  <h2 style="text-align: center; margin-bottom: 25px;">Crear Nueva Cuenta</h2>

  <div style="margin-bottom: 15px;">
    <label>Nombre de Usuario:</label><br>
    <input type="text" [(ngModel)]="nuevoUsuario.username" placeholder="Ej: vinyl_lover" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;">
  </div>

  <div style="margin-bottom: 15px;">
    <label>Email:</label><br>
    <input type="email" [(ngModel)]="nuevoUsuario.email" placeholder="correo@ejemplo.com" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;">
  </div>

  <div style="margin-bottom: 20px;">
    <label>Contraseña:</label><br>
    <div style="display: flex; margin-top: 5px;">
      <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="nuevoUsuario.password" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
      <button type="button" (click)="showPassword = !showPassword" style="margin-left: -40px; background: none; border: none; cursor: pointer; font-size: 1.2rem;">
        {{ showPassword ? '👁️' : '🙈' }}
      </button>
    </div>
  </div>

  <button (click)="onRegistro()" style="width: 100%; background: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem;">
    Registrarse
  </button>

  <p *ngIf="errorMsg" style="color: #dc3545; font-size: 0.9em; margin-top: 15px; text-align: center;">{{ errorMsg }}</p>

  <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

  <p style="text-align: center; font-size: 0.9em;">
    ¿Ya tienes cuenta? <a routerLink="/login" style="color: #007bff; text-decoration: none; font-weight: bold;">Inicia sesión</a>
  </p>
</div>
